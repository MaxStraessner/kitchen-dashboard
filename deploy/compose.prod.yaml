name: kitchen-dashboard
services:
  kitchen-dashboard-web:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "${APP_HTTP_PORT:-8080}:8080"
    restart: unless-stopped
    depends_on:
      kitchen-dashboard-api:
        condition: service_healthy
    networks: [kitchen-dashboard-app]
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 4s
      retries: 5

  kitchen-dashboard-api:
    build:
      context: ../backend
    command: ["sh", "-c", "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"]
    env_file:
      - path: ../.env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL}
      APP_ENV: production
      AUTH_COOKIE_SECURE: "true"
      AUTH_SESSION_TTL_HOURS: ${AUTH_SESSION_TTL_HOURS:-24}
      AUTH_REMEMBER_TTL_DAYS: ${AUTH_REMEMBER_TTL_DAYS:-30}
      AUTH_LOGIN_MAX_ATTEMPTS: ${AUTH_LOGIN_MAX_ATTEMPTS:-5}
      AUTH_LOGIN_WINDOW_MINUTES: ${AUTH_LOGIN_WINDOW_MINUTES:-15}
      AUTH_ALLOWED_ORIGINS: ${AUTH_ALLOWED_ORIGINS:?Set AUTH_ALLOWED_ORIGINS to the HTTPS application origin}
      APP_TIMEZONE: ${APP_TIMEZONE:-Europe/Berlin}
      WEATHER_LOCATION_NAME: ${WEATHER_LOCATION_NAME:-Unna}
      WEATHER_LATITUDE: ${WEATHER_LATITUDE:-51.537}
      WEATHER_LONGITUDE: ${WEATHER_LONGITUDE:-7.689}
      CALENDAR_CACHE_TTL_SECONDS: ${CALENDAR_CACHE_TTL_SECONDS:-60}
      CALENDAR_SOURCES_JSON: ${CALENDAR_SOURCES_JSON:-[]}
    restart: unless-stopped
    depends_on:
      kitchen-dashboard-postgres:
        condition: service_healthy
    networks: [kitchen-dashboard-app, kitchen-dashboard-data]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=2)"]
      interval: 30s
      timeout: 4s
      retries: 5

  kitchen-dashboard-postgres:
    image: postgres:17.6-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    volumes:
      - kitchen-dashboard-postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks: [kitchen-dashboard-data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 15s
      timeout: 5s
      retries: 8

networks:
  kitchen-dashboard-app:
  kitchen-dashboard-data:
    internal: true

volumes:
  kitchen-dashboard-postgres-data:
